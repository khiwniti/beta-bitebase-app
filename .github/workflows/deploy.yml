name: Deploy BiteBase Frontend

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run TypeScript type checking
      run: npm run check-types
    
    - name: Run ESLint
      run: npm run lint
    
    - name: Build application
      run: npm run build
      env:
        NEXT_PUBLIC_API_URL: https://bitebase-backend-express.vercel.app
        NEXT_PUBLIC_BACKEND_URL: https://bitebase-backend-express.vercel.app
    
    - name: Check for security vulnerabilities
      run: npm audit --audit-level high

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build application
      run: npm run build
      env:
        NEXT_PUBLIC_API_URL: https://bitebase-backend-express.vercel.app
        NEXT_PUBLIC_BACKEND_URL: https://bitebase-backend-express.vercel.app
        NEXT_PUBLIC_ENABLE_MAPS: true
        NEXT_PUBLIC_ENABLE_AI_CHAT: true
    
    - name: Deploy to Vercel
      uses: vercel/action@v1
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        vercel-args: '--prod'
    
    - name: Post-deployment test
      run: |
        sleep 30
        curl -f https://beta-bitebase-app.vercel.app || exit 1
        echo "✅ Frontend deployment successful and accessible"